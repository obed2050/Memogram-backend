services:
  - type: web
    name: memogram-backend
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: node src/index.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: memogram-db
          property: connectionString
      - key: REDIS_URL
        fromDatabase:
          name: memogram-redis
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 30d
      - key: FRONTEND_URL
        value: https://memogram-frontend.onrender.com
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
      - key: PORT
        value: 10000

  - type: postgres
    name: memogram-db
    plan: free
    databaseName: memogram
    ipAllowList: []

  - type: redis
    name: memogram-redis
    plan: free
    ipAllowList: []
    maxmemoryPolicy: allkeys-lru
